<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Cat - Level Select</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #05050A;
            color: #00FF9D;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00FF9D;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 950px;
        }

        .section {
            background: #101018;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
        }

        .section-title {
            color: #FFF;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }

        button {
            background-color: #151520;
            color: #00FF9D;
            border: 2px solid #00FF9D;
            padding: 12px 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        button:hover:not(:disabled) {
            background-color: #00FF9D;
            color: #05050A;
            box-shadow: 0 0 10px #00FF9D;
        }

        button:disabled {
            background-color: #1a1a1a;
            color: #444;
            border-color: #2a2a2a;
            cursor: not-allowed;
            text-shadow: none;
        }

        .actions {
            margin-top: 35px;
        }

        .reset-btn {
            background-color: #C53030;
            color: #FFF;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .reset-btn:hover {
            background-color: #E53E3E;
        }
    </style>
</head>

<body>

    <h1>Cyber Cat - Zones</h1>

    <div class="container">
        <div class="section">
            <div class="section-title">01. Serwers</div>
            <div class="grid">
                <button id="lvl-1" onclick="selectLevel(1, '../index.html')">1. Serwers</button>
                <button id="lvl-2" onclick="selectLevel(2, '../SerWers/Level2/level2.html')">2. Serwers</button>
                <button id="lvl-3" onclick="selectLevel(3, '../SerWers/Level3/level3.html')">3. Serwers</button>
                <button id="lvl-4" onclick="selectLevel(4, '../SerWers/Level4/level4.html')">4. Serwers</button>
                <button id="lvl-5" onclick="selectLevel(5, '../SerWers/Level5/level5.html')">5. Serwers</button>
                <button id="lvl-6" onclick="selectLevel(6, '../SerWers/Level6-prechod_do_bugtown/Prechod.html')">6.
                    Serwers</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">02. BugTown</div>
            <div class="grid">
                <button id="lvl-7" onclick="selectLevel(7, '../BugTown/Level1/level1.html')">1. BugTown</button>
                <button id="lvl-8" onclick="selectLevel(8, '../BugTown/Level2/level2.html')">2. BugTown</button>
                <button id="lvl-9" onclick="selectLevel(9, '../BugTown/Level3/level3.html')">3. BugTown</button>
                <button id="lvl-10" onclick="selectLevel(10, '../BugTown/Level4/level4.html')">4. BugTown</button>
                <button id="lvl-11" onclick="selectLevel(11, '../BugTown/Level5/level5.html')">5. BugTown</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">03. DataBay</div>
            <div class="grid">
                <button id="lvl-12" onclick="selectLevel(12, '../DataBay/Level1/level1d.html')">1. DataBay</button>
                <button id="lvl-13" onclick="selectLevel(13, '../DataBay/Level2/level22D.html')">2. DataBay</button>
                <button id="lvl-14" onclick="selectLevel(14, '../DataBay/Level3/level3D.html')">3. DataBay</button>
                <button id="lvl-15" onclick="selectLevel(15, '../DataBay/Level4/level4.html')">4. DataBay</button>
                <button id="lvl-16" onclick="selectLevel(16, '../DataBay/Level5/level5.html')">5. DataBay</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">04. UploadHighway</div>
            <div class="grid">
                <button id="lvl-17" onclick="selectLevel(17, '../UploadHighway/Level1/level1UH.html')">1.
                    UploadHighway</button>
                <button id="lvl-18" onclick="selectLevel(18, '../UploadHighway/Level2/level2UH.html')">2.
                    UploadHighway</button>
                <button id="lvl-19" onclick="selectLevel(19, '../UploadHighway/Level3/level3UH.html')">3.
                    UploadHighway</button>
                <button id="lvl-20" onclick="selectLevel(20, '/UploadHighway/Level4/level4.html')">4.
                    UploadHighway</button>
                <button id="lvl-21" onclick="selectLevel(21, '/UploadHighway/Level5/level5.html')">5.
                    UploadHighway</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">05. The-Cor</div>
            <div class="grid">
                <button id="lvl-22" onclick="selectLevel(22, '../The-COR/PredmestieCoru/predmestie.html')">1. The-Cor</button>
                <button id="lvl-23" onclick="selectLevel(23, '../UploadHighway/Level2/level2UH.html')">2. The-Cor</button>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="reset-btn" onclick="resetProgress()">Reset progresu</button>
    </div>

    <script src="../progresik.js"></script>
</body>

</html>

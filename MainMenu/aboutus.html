<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>Kyber Mačka - About Us</title>

    <link rel="stylesheet" href="aboutus.css">
</head>
<body>

    <!-- BACKGROUND -->
    <div class="background-container">

        <!-- TOP -->
        <div class="zone zone-top">
            <div class="server-room">
                <div class="rack"><div class="leds"></div><div class="label">USR-01</div></div>
                <div class="rack"><div class="leds"></div><div class="label">USR-02</div></div>
                <div class="rack"><div class="leds"></div><div class="label">CORE-X</div></div>
            </div>
        </div>

        <!-- LEFT -->
        <div class="zone zone-left">
            <div class="skyline">
                <div class="building b1"><div class="windows"></div></div>
                <div class="building b2"><div class="windows"></div></div>
                <div class="building b3"><div class="windows"></div></div>
                <div class="building b4"><div class="windows"></div></div>
            </div>

            <div class="warning-layer">ABOUT_THE_TEAM</div>
        </div>

        <!-- RIGHT -->
        <div class="zone zone-right">
            <div class="digital-water"></div>

            <div class="data-packets">
                <div class="packet p1"></div>
                <div class="packet p2"></div>
                <div class="packet p3"></div>
            </div>
        </div>

        <!-- BOTTOM -->
        <div class="zone zone-bottom">
            <div class="highway">
                <div class="lane-lines"></div>

                <div class="traffic-flow">
                    <div class="data-unit v1"></div>
                    <div class="data-unit v2"></div>
                    <div class="data-unit v3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- X LINES -->
    <div class="x-lines">
        <div class="line l1"></div>
        <div class="line l2"></div>
    </div>

    <!-- CONTENT -->
    <div class="about-container">

        <div class="about-panel">

            <h1 class="about-title">
                ABOUT US
            </h1>

            <div class="content-box">

                <!-- SEM SI DOPLŇ TEXT -->

                <h2></h2>

                <p>
            <b> Programátori: </b>
           <p> Matej Kapusniak</p>
        <p> Ján Kristián Preisler</p>   


        <p><b>Dizajn:</b></p>
<p>Matej Kapusniak,  Ján Kristián Preisler</p>

<p><b>Soundtracky:</b></p>
<p>Hans Christián Preisler</p>


<p><b>Testery:</b></p>
<p>Marek, Samo, Marek, Marek, Alica, Braňo, Jakub, Matej</p>

                </p>

             

            </div>

            <a
                href="javascript:void(0)"
                onclick="krasneprehadzovanie('menu.html')"
            >
                <button class="cyber-button">
                    ← BACK
                </button>
            </a>

        </div>

    </div>

    <!-- MUSIC -->
    <audio id="bgMusic" loop>
        <source src="/Zvuky/Main title song.mp3" type="audio/mpeg">
    </audio>

    <script src="aboutus.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kyber Mačka</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <div class="background-container">
        <div class="zone zone-top">
            <div class="server-room">
                <div class="rack"><div class="leds"></div><div class="label">SVR-01</div></div>
                <div class="rack"><div class="leds"></div><div class="label">SVR-02</div></div>
                <div class="rack"><div class="leds"></div><div class="label">SVR-03</div></div>
                <div class="rack"><div class="leds"></div><div class="label">SVR-04</div></div>
                <div class="rack"><div class="leds"></div><div class="label">DB-X</div></div>
            </div>
        </div>

        <div class="zone zone-left">
            <div class="skyline">
                <div class="building b1"><div class="windows"></div></div>
                <div class="building b2"><div class="windows"></div></div>
                <div class="building b3"><div class="windows"></div></div>
                <div class="building b4"><div class="windows"></div></div>
            </div>
            <div class="glitch-rain"></div>
            <div class="warning-layer">CRITICAL_ERROR</div>
        </div>

        <div class="zone zone-right">
            <div class="digital-water"></div>
            <div class="data-packets">
                <div class="packet p1"></div>
                <div class="packet p2"></div>
                <div class="packet p3"></div>
            </div>
        </div>

        <div class="zone zone-bottom">
            <div class="highway">
                <div class="lane-lines"></div>
                <div class="traffic-flow">
                    <div class="data-unit v1"></div>
                    <div class="data-unit v2"></div>
                    <div class="data-unit v3"></div>
                    <div class="data-unit v4"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="x-lines">
        <div class="line l1"></div>
        <div class="line l2"></div>
    </div>

    <div class="center-stage">
        <canvas id="coreCanvas"></canvas>
        <h1 class="main-title">KYBER<br>MAČKA</h1>
    </div>

    <div class="ui-layer">
        <a class="nav-link pos-top" href="javascript:void(0)" onclick="krasneprehadzovanie('../index.html')">
            <button class="cyber-button">PLAY</button>
        </a>
        <a class="nav-link pos-left" href="javascript:void(0)" onclick="krasneprehadzovanie('aboutgame.html')">
            <button class="cyber-button">Quit</button>
        </a>
        <a class="nav-link pos-right" href="javascript:void(0)" onclick="krasneprehadzovanie('settings.html')">
            <button class="cyber-button">SETTINGS</button>
        </a>
        <a class="nav-link pos-bottom" href="javascript:void(0)" onclick="krasneprehadzovanie('aboutus.html')">
            <button class="cyber-button">ABOUT US</button>
        </a>
    </div>

    <audio id="bgMusic" loop>
        <source src="/Zvuky/Main title song.mp3" type="audio/mpeg">
    </audio>

    <script src="menu.js"></script>
</body>
</html>
